services:
  # Base de Datos (Producción)
  mariadb:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: fitel-mariadb
    environment:
      MYSQL_DATABASE: fitel_db
      MYSQL_USER: fitel
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitel-network
    restart: always

  # Backend API (Producción)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitel-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DATABASE_URL: jdbc:mariadb://mariadb:3306/fitel_db
      DATABASE_USERNAME: fitel
      DATABASE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      STORAGE_PROVIDER: local
      STORAGE_BASE_URL: ${STORAGE_BASE_URL}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_FROM: ${MAIL_FROM}
      # Configuración de URLs para correos y redirecciones
      APP_FRONTEND_URL: https://${SERVER_IP}
      # IPs permitidas para el servicio SOAP de la SIC (separadas por coma)
      FITEL_SIC_ALLOWED_IPS: ${FITEL_SIC_ALLOWED_IPS:-127.0.0.1}
      FITEL_SIC_ALLOWED-IPS: ${FITEL_SIC_ALLOWED_IPS:-127.0.0.1}
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
    networks:
      - fitel-network
    restart: always

  # Frontend (Producción)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Importante: Next.js 'quema' esta variable al momento de construir (build)
        NEXT_PUBLIC_API_URL: https://${SERVER_IP}/api
    container_name: fitel-frontend
    environment:
      NODE_ENV: production
      ALLOWED_ADMIN_IPS: ${ALLOWED_ADMIN_IPS}
    ports:
      - "127.0.0.1:3000:3000" # Solo accesible desde localhost (Nginx proxea)
    depends_on:
      - backend
    networks:
      - fitel-network
    restart: always

volumes:
  mariadb_data:

networks:
  fitel-network:
    driver: bridge
