services:
  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: fitel-mariadb
    environment:
      MYSQL_DATABASE: fitel_db
      MYSQL_USER: fitel
      MYSQL_PASSWORD: fiteladmin123
      MYSQL_ROOT_PASSWORD: rootpassword123
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fitel-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitel-backend
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:mariadb://mariadb:3306/fitel_db
      DATABASE_USERNAME: fitel
      DATABASE_PASSWORD: fiteladmin123
      JWT_SECRET: your-secret-key-change-in-production-min-256-bits
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-zspgebdrjeoducpz}
      MAIL_FROM: ${MAIL_FROM:-}
    ports:
      - "8080:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - fitel-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: fitel-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
      # Whitelist de IPs para panel admin (separadas por comas)
      # IPs configuradas: localhost, Wi-Fi (192.168.1.5), y rango de red local (192.168.1.0/24)
      # Para agregar más IPs, edita esta línea o usa variable de entorno ALLOWED_ADMIN_IPS
      ALLOWED_ADMIN_IPS: ${ALLOWED_ADMIN_IPS:-127.0.0.1,::1,192.168.1.5,192.168.1.0/24,172.31.176.1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - fitel-network
    restart: unless-stopped

volumes:
  mariadb_data:

networks:
  fitel-network:
    driver: bridge
