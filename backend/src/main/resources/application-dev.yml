spring:
  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://mariadb:3306/fitel_db}
    username: ${DATABASE_USERNAME:fitel}
    password: ${DATABASE_PASSWORD:fiteladmin123}
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    co.com.fitel: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
