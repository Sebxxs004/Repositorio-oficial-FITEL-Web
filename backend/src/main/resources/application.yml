spring:
  application:
    name: fitel-web-backend
  
  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://localhost:3307/fitel_db}
    username: ${DATABASE_USERNAME:fitel}
    password: ${DATABASE_PASSWORD:fiteladmin123}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false
  
  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
      expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
    ip:
      encryption:
        key: ${IP_ENCRYPTION_KEY:FITEL-IP-ENC-KEY-32CHARS-LONG!!} # ⚠️ CAMBIAR EN PRODUCCIÓN - Debe tener 32 caracteres

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

logging:
  level:
    root: INFO
    co.com.fitel: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_PARAM_LOG_LEVEL:TRACE}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fitel-web.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
