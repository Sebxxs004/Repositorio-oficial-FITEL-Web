spring:
  application:
    name: fitel-web-backend
  
  web:
    resources:
      # Configurar recursos estáticos pero excluir /api/**
      add-mappings: true
      static-locations: classpath:/static/,classpath:/public/
      chain:
        strategy:
          # Los controladores REST tienen prioridad sobre recursos estáticos
          content-negotiation:
            favor-parameter: false
            favor-path-extension: false
  
  servlet:
    multipart:
      # Tamaño máximo por archivo individual
      max-file-size: 50MB
      # Tamaño máximo total de la petición (puede incluir múltiples archivos)
      max-request-size: 50MB
      # Ubicación temporal para archivos subidos
      location: ${java.io.tmpdir}
  
  datasource:
    url: ${DATABASE_URL:jdbc:mariadb://localhost:3307/fitel_db?characterEncoding=utf8mb4&connectionCollation=utf8mb4_unicode_ci}
    username: ${DATABASE_USERNAME:fitel}
    password: ${DATABASE_PASSWORD:fiteladmin123}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        use_sql_comments: true
    open-in-view: false

  security:
    jwt:
      secret: ${JWT_SECRET:your-secret-key-change-in-production-min-256-bits}
      expiration: ${JWT_EXPIRATION:3600000} # 1 hour in milliseconds
    ip:
      encryption:
        key: ${IP_ENCRYPTION_KEY:FITEL-IP-ENC-KEY-32CHARS-LONG!!} # ⚠️ CAMBIAR EN PRODUCCIÓN - Debe tener 32 caracteres
  
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:} # Contraseña de aplicación de Gmail
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
    from: ${MAIL_FROM:} # Email desde el cual se envían los correos

storage:
  # Opciones: local, azure
  provider: ${STORAGE_PROVIDER:local}
  local:
    location: uploads
  base-url: ${STORAGE_BASE_URL:http://localhost:8080}

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    container-name: ${AZURE_STORAGE_CONTAINER_NAME:fitel-documents}

server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false

logging:
  level:
    root: INFO
    co.com.fitel: ${LOG_LEVEL:DEBUG}
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:DEBUG}
    org.hibernate.type.descriptor.sql.BasicBinder: ${SQL_PARAM_LOG_LEVEL:TRACE}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/fitel-web.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

fitel:
  sic:
    allowed-ips: 127.0.0.1, 192.168.1.10
